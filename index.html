<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1628">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ETTUR La Universidad</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/app.css">
</head>
<body>

    <!-- Splash / Loading Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-icon">
                <i class="bi bi-bus-front-fill"></i>
            </div>
            <h1 class="splash-title">ETTUR</h1>
            <p class="splash-subtitle">La Universidad</p>
            <div class="splash-loader">
                <div class="splash-bar"></div>
            </div>
        </div>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen" style="display:none;">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <i class="bi bi-bus-front-fill"></i>
                </div>
                <h1>ETTUR</h1>
                <p>La Universidad — Sistema de Recaudación</p>
            </div>
            <form id="login-form" class="login-form" autocomplete="off">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="login-username" placeholder="Usuario" required autocomplete="username">
                    <label for="login-username"><i class="bi bi-person"></i> Usuario</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="login-password" placeholder="Contraseña" required autocomplete="current-password">
                    <label for="login-password"><i class="bi bi-lock"></i> Contraseña</label>
                </div>
                <div id="login-error" class="alert alert-danger d-none" role="alert"></div>
                <button type="submit" class="btn btn-primary btn-lg w-100 btn-login" id="btn-login">
                    <span class="btn-text">Iniciar Sesión</span>
                    <span class="btn-loader d-none"><span class="spinner-border spinner-border-sm"></span></span>
                </button>
            </form>
            <div class="login-footer">
                <small>v1.0 · Sistema Integral de Recaudación</small>
            </div>
        </div>
    </div>

    <!-- Main App Shell -->
    <div id="app-shell" class="app-shell" style="display:none;">

        <!-- Top Header Bar -->
        <header class="app-header">
            <div class="header-left">
                <button class="btn btn-link btn-menu" id="btn-sidebar" aria-label="Menú">
                    <i class="bi bi-list"></i>
                </button>
                <div class="header-brand">
                    <i class="bi bi-bus-front-fill"></i>
                    <span>ETTUR</span>
                </div>
            </div>
            <div class="header-right">
                <span class="badge-role" id="badge-rol"></span>
                <div class="header-avatar" id="header-avatar" title="Mi cuenta">
                    <i class="bi bi-person-circle"></i>
                </div>
            </div>
        </header>

        <!-- Sidebar / Drawer -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-user-info">
                    <div class="sidebar-avatar"><i class="bi bi-person-circle"></i></div>
                    <div class="sidebar-user-text">
                        <strong id="sidebar-nombre"></strong>
                        <small id="sidebar-rol"></small>
                    </div>
                </div>
                <button class="btn btn-link btn-close-sidebar" id="btn-close-sidebar">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
            <nav class="sidebar-nav" id="sidebar-nav">
                <!-- Dynamic menu items loaded by JS -->
            </nav>
            <div class="sidebar-footer">
                <button class="btn btn-outline-danger btn-sm w-100" id="btn-logout">
                    <i class="bi bi-box-arrow-left"></i> Cerrar Sesión
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="app-main" id="app-main">
            <!-- Content loaded dynamically -->
        </main>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav" id="bottom-nav">
            <!-- Dynamic bottom nav loaded by JS -->
        </nav>
    </div>

    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3" id="toast-container"></div>

    <!-- Modal Global -->
    <div class="modal fade" id="global-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modal-title"></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modal-body"></div>
                <div class="modal-footer" id="modal-footer"></div>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div class="modal fade" id="image-modal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark">
                <div class="modal-header border-0">
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-0">
                    <img id="image-modal-img" src="" class="img-fluid" alt="Comprobante">
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/pagos.js"></script>
    <script src="js/pages/validar.js"></script>
    <script src="js/pages/reportes.js"></script>
    <script src="js/pages/usuarios.js"></script>
    <script src="js/pages/tarifas.js"></script>
    <script src="js/pages/perfil.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
